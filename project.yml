name: CodexMenuBar

options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  CodexMenuBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/CodexMenuBar
        excludes:
          - Resources
    resources:
      - path: Sources/CodexMenuBar/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.CodexMenuBar
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"

  CodexMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CodexMenuBarTests
        excludes:
          - SwiftPMSandboxTestingAnchor.swift
      - path: Sources/SwiftPMSandboxTestingBootstrap/SandboxTestingBootstrap.c
    dependencies:
      - target: CodexMenuBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.CodexMenuBarTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CodexMenuBar.app/Contents/MacOS/CodexMenuBar"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  CodexMenuBar:
    build:
      targets:
        CodexMenuBar: all
    test:
      targets:
        - CodexMenuBarTests
      environmentVariables:
        SEATBELT_SANDBOX_WORKSPACE_ROOT: "$(SRCROOT)"
